    <style>
        /* ---------- ГЛОБАЛЬНЫЕ СТИЛИ ---------- */
        * {
            box-sizing: border-box;
        }
        body {
            background: #0c0c14;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 24px 20px;
            color: #eef2ff;
        }
        .container {
            max-width: 1500px;
            margin: 0 auto;
        }
.assistant-btn.disabled,
.random-btn.disabled,
.reset-cat.disabled,
.preset-item.disabled {
    opacity: 0.5;
    pointer-events: none;
    cursor: default;
}

input[type="radio"]:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

        /* ---------- ЗАГОЛОВОК С БЛИКОМ ---------- */
        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin: 0 0 0.25rem 0;
            padding: 0.5rem 1rem;
            display: inline-block;
            background: transparent;
            color: transparent;
            background-image: linear-gradient(135deg, #e9b35f, #c44569),
                              linear-gradient(90deg, transparent, rgba(255,255,255,0.9), rgba(255,255,255,0.9), transparent);
            background-repeat: no-repeat, no-repeat;
            background-size: auto, 200% 100%;
            background-position: 0 0, -200% 0;
            -webkit-background-clip: text;
            background-clip: text;
            animation: slideGloss 0.5s infinite linear;
            border: 2px solid #e9b35f;
            border-radius: 1rem;
            box-shadow: 0 0 8px rgba(233,179,95,0.3);
        }
        @keyframes slideGloss {
            0% { background-position: 0 0, -200% 0; }
            14% { background-position: 0 0, 200% 0; }
            100% { background-position: 0 0, 200% 0; }
        }

        /* ---------- АНИМАЦИЯ БЕГУЩЕЙ СТРОКИ ---------- */
        @keyframes marqueeScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .sub {
            color: #8a8aa6;
            margin-bottom: 2rem;
            border-left: 3px solid #e94560;
            padding-left: 1rem;
        }

        /* ---------- СЕТКА КАРТОЧЕК ---------- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 1.5rem;
        }

        /* ---------- КАРТОЧКА КАТЕГОРИИ ---------- */
        .category {
            background: #13131f;
            border-radius: 1.5rem;
            border: 1px solid #26263a;
            overflow: hidden;
        }
        .category-header {
            background: #1a1a2a;
            padding: 1rem 1.2rem;
            border-bottom: 1px solid #2a2a3e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .category-header h2 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
        }
        .reset-cat {
            background: none;
            border: 1px solid #e94560;
            color: #e94560;
            border-radius: 2rem;
            padding: 0.2rem 0.8rem;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .reset-cat:hover {
            background: #e94560;
            color: white;
        }
        /* активная кнопка сброса категории (выбран пресет) */
        .reset-cat.active {
            background: #e94560;
            color: white;
        }

        /* ---------- ПРЕСЕТЫ ---------- */
        .presets-list {
            padding: 0.8rem 1rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            max-height: 400px;
            overflow-y: auto;
        }
        .preset-item {
            background: #1c1c28;
            border-radius: 1rem;
            padding: 0.6rem 1rem;
            display: flex;
            align-items: flex-start;
            gap: 0.8rem;
            border: 1px solid #2a2a38;
            cursor: pointer;
            transition: all 0.1s ease;
        }
        .preset-item:hover {
            background: #242434;
        }
        .preset-item.selected {
            background: #2a2a40;
            border-left: 4px solid #e94560;
            padding-left: calc(1rem - 4px);
        }
        input[type="radio"] {
            margin-top: 2px;
            accent-color: #e94560;
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            cursor: pointer;
        }
        .preset-info {
            flex: 1;
            min-width: 0;
        }
        .preset-label {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .preset-desc {
            font-size: 0.7rem;
            color: #9c9cbb;
            margin-top: 4px;
            line-height: 1.3;
            overflow-x: hidden;
            white-space: nowrap;
        }
        .marquee-track {
            overflow-x: hidden;
            width: 100%;
        }
        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            will-change: transform;
        }
        .preset-item:hover .marquee-content {
            animation: marqueeScroll linear infinite;
        }

        /* ---------- ПОЛЯ ВВОДА ---------- */
        .user-fields {
            background: #0f0f18;
            border-radius: 1.5rem;
            padding: 1.2rem;
            margin-bottom: 2rem;
            border: 1px solid #2a2a3a;
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
        }
        .field-group {
            flex: 1;
            min-width: 180px;
        }
        .field-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #b0b0d0;
            margin-bottom: 0.3rem;
            transition: color 0.2s ease;
        }
        /* подсветка заполненного поля */
        .field-group label.filled {
            color: #e94560;
        }
        .field-group input {
            width: 100%;
            background: #1c1c28;
            border: 1px solid #2f2f3f;
            border-radius: 1rem;
            padding: 0.6rem 1rem;
            color: white;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        .field-group input:focus {
            border-color: #e94560;
            outline: none;
            background: #222235;
        }

        /* ---------- БЛОК ВЫВОДА ПРОМПТА ---------- */
        .output {
            margin-top: 2rem;
            background: #0a0a10;
            border-radius: 1.5rem;
            border: 1px solid #2a2a3a;
            overflow: hidden;
        }
        .output-header {
            background: #111118;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #222;
        }
        .output-header h3 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 500;
            color: #cdd6f4;
        }
        .top-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            gap: 0.8rem;
            margin-top: 0.5rem;
        }
        .copy-btn, .reset-all, .translate-btn, .save-btn, .random-btn {
            background: #2c2c3a;
            border: 1px solid #8a8aa6;
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            color: #eee;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }
        .copy-btn:hover, .reset-all:hover, .translate-btn:hover, .save-btn:hover, .random-btn:hover {
            background: #3d3d55;
        }
        .copy-btn.has-presets {
            background: #2c5a3a;
            border: 1px solid #6aab7a;
            color: #d0f0d0;
        }
        .copy-btn.has-presets:hover {
            background: #3a7a4a;
            border-color: #8acc9a;
        }
        .reset-all {
            background: #1e1e2c;
            border: 1px solid #e94560;
            color: #e94560;
        }
        .reset-all:hover {
            background: #e94560;
            color: white;
        }
        /* активная кнопка "Сбросить всё" (есть выбранные пресеты) */
        .reset-all.active {
            background: #e94560;
            color: white;
        }
        .translate-btn {
            background: #252538;
            border: 1px solid #8a8aa6;
            color: #cdd6f4;
        }
        .translate-btn:hover {
            background: #3a3a55;
            border-color: #e94560;
        }
        .random-btn {
            background: #2c2c3a;
            border: 1px solid #8a8aa6;
            color: #cdd6f4;
        }
        .random-btn:hover {
            background: #3a3a55;
            border-color: #e94560;
        }
        .second-row-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            gap: 0.8rem;
            padding: 1rem 1.5rem;
            border-top: 1px solid #222;
        }
        .portal-btn {
            background: #252538;
            border: 1px solid #8a8aa6;
            border-radius: 2rem;
            padding: 0.4rem 1.2rem;
            font-size: 0.8rem;
            font-weight: normal;
            color: #cdd6f4;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .portal-btn:hover {
            background: #e9b35f;
            border-color: #e9b35f;
            color: #0c0c14;
        }
        #finalPrompt {
            margin: 0;
            padding: 1.5rem;
            background: #010104;
            color: #cdd6f4;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            width: 100%;
            border: none;
            resize: vertical;
            outline: none;
            line-height: 1.4;
            transition: color 0.2s ease;
        }
        /* Стиль для изменённого промпта – яркий золотистый */
        #finalPrompt.edited {
            color: #e9b35f;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #4a4a66;
        }
        footer a {
            color: #8a8aa6;
            text-decoration: none;
            transition: color 0.2s;
        }
        footer a:hover {
            color: #e9b35f;
            text-decoration: underline;
        }
        @media (max-width: 800px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        /* ---------- ПЕРЕТАСКИВАЕМАЯ ИКОНКА ---------- */
        #drag-icon {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 180px;
            height: auto;
            z-index: 10000;
            cursor: grab;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }
        #drag-icon:active {
            cursor: grabbing;
        }
        #drag-icon svg {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
        }

        /* Индикатор внесённых изменений – тоже золотистый */
        .decomposition-note {
            font-size: 0.7rem;
            margin-left: 1rem;
            color: #8a8aa6;
            font-style: normal;
            letter-spacing: normal;
            text-transform: none;
            align-self: center;
        }
        .manual-indicator {
            font-size: 0.7rem;
            margin-left: 1rem;
            color: #e9b35f;
        }

        /* Все кнопки заглавными буквами */
        .top-buttons button,
        .second-row-buttons button,
        .reset-cat {
            text-transform: uppercase;
        }

        /* ---------- СТИЛИ ДЛЯ БЛОКА АССИСТЕНТ ---------- */
        .assistant-panel {
            margin-top: 2rem;
            background: #0a0a10;
            border-radius: 1.5rem;
            border: 1px solid #2a2a3a;
            overflow: hidden;
        }
        .assistant-header {
            background: #111118;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #2a2a3a;
        }
        .assistant-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: flex-start;
        }
        .assistant-btn {
            background: #252538;
            border: 1px solid #8a8aa6;
            border-radius: 2rem;
            padding: 0.4rem 1.2rem;
            font-size: 0.8rem;
            font-weight: normal;
            color: #cdd6f4;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            font-family: inherit;
        }
        .assistant-btn:hover {
            background: #3a3a55;
            border-color: #e94560;
        }
        .assistant-btn.active {
            background: #e94560;
            border-color: #e94560;
            color: white;
        }
        .assistant-content {
            transition: all 0.3s ease-in-out;
            background: #010104;
            border-top: none;
        }
        .assistant-content iframe {
            width: 100%;
            height: 500px;
            border: none;
            display: block;
            background: #010104;
        }
        .generator-container {
            padding: 1.5rem;
            color: #cdd6f4;
        }
        .generator-container textarea {
            width: 100%;
            background: #1c1c28;
            border: 1px solid #2f2f3f;
            border-radius: 1rem;
            padding: 0.8rem;
            color: white;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            resize: vertical;
            margin-bottom: 1rem;
        }
        .generator-container button {
            background: #2c5a3a;
            border: 1px solid #6aab7a;
            border-radius: 2rem;
            padding: 0.4rem 1.2rem;
            color: white;
            cursor: pointer;
            text-transform: uppercase;
        }
        .generator-container button:hover {
            background: #3a7a4a;
        }
        .generator-result {
            margin-top: 1rem;
            background: #13131f;
            border-radius: 1rem;
            padding: 1rem;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 0.7rem;
            max-height: 300px;
            overflow: auto;
        }
        @media (max-width: 600px) {
            .assistant-content iframe {
                height: 400px;
            }
            .generator-container {
                padding: 1rem;
            }
        }
    </style>

<div class="container">

    <!-- ПОЛЯ ВВОДА ПЕРСОНАЖА -->

        <div class="field-group"><label id="genderLabel">ПОЛ</label><input type="text" id="genderInput" placeholder=" мужской / женский / небинарный " value=""></div>
        <div class="field-group"><label id="raceLabel">РАСА</label><input type="text" id="raceInput" placeholder=" азиат/ эльф/ орк/ дроу/ робот" value=""></div>
        <div class="field-group"><label id="sceneLabel">Сцена / ОКРУЖЕНИЕ</label><input type="text" id="sceneInput" placeholder=" пишите всё на английском" value=""></div>
    </div>

    <!-- КОНТЕЙНЕР ДЛЯ КАТЕГОРИЙ С ПРЕСЕТАМИ -->
    <div id="categoriesContainer" class="grid"></div>

    <!-- БЛОК ВЫВОДА ПРОМПТА -->
<div class="output">
    <div class="output-header">
        <h3>ФИНАЛЬНЫЙ ПРОМПТ <span id="editingHint" style="font-weight: normal;">| окно для редактирования</span><span id="manualEditBadge" class="manual-indicator"></span></h3>
        <div class="top-buttons">
            <button class="translate-btn" id="translateBtn">English</button>
            <button class="save-btn" id="saveBtn">СОХРАНИТЬ</button>
            <button class="random-btn" id="randomBtn">RANDOM</button>
            <button class="reset-all" id="resetAllBtn">СБРОСИТЬ ВСЁ</button>
            <button class="copy-btn" id="copyFinalBtn">КОПИРОВАТЬ</button>
        </div>
    </div>
    <textarea id="finalPrompt" rows="18" placeholder="// Заполните поля и выберите пресеты..."></textarea>
    <div class="second-row-buttons">
        <button class="portal-btn" onclick="window.open('https://jayflow.ai', '_blank')">JayFlow.ai</button>
        <button class="portal-btn" onclick="window.open('https://leonardo.ai', '_blank')">Leonardo.ai</button>
        <button class="portal-btn" onclick="window.open('https://www.seaart.ai', '_blank')">SeaArt.ai</button>
        <button class="portal-btn" onclick="window.open('https://vk.com/saiapin_andrei?w=wall808117921_133', '_blank')">VK · пост о конструкторе</button>
<button class="portal-btn" id="hlsRadioBtn">▶</button>
    </div>
</div>

    <div class="assistant-header">
        <div class="assistant-buttons">
            <button class="assistant-btn" data-target="generator">ДЕКОМПОЗИЦИЯ</button>
            <span id="decompositionNote" class="decomposition-note"

        </div>

    <div class="assistant-content" id="assistantContent" style="display: none;"></div>
</div>

    // ======================= 1. ДАННЫЕ КАТЕГОРИЙ (ПРЕСЕТЫ) =======================
    const categoriesData = [
    {
        nameRu: "[1] СТИЛЬ",
        nameEn: "[1] STYLE",
        marquee: true,
        presets: [
            { labelRu: "[1|1] Гуашь / Матовая иллюстрация", labelEn: "[1|1] Gouache / Matte illustration", descRu: "Плоские цветовые пятна с лёгким зерном, мягкие переходы, отсутствие бликов. Roughness 0.9–1.0, Specular 0.1, Subsurface 0.05. Матовая бумажная фактура.", descEn: "Flat color spots with slight grain, soft transitions, no sharp highlights. Roughness 0.9–1.0, Specular 0.1, Subsurface 0.05. Matte, paper-like." },
            { labelRu: "[2|1] Деревянная марионетка", labelEn: "[2|1] Wooden puppet", descRu: "Сегментированные сочленения, фактура тонированного дерева. Roughness 0.6 с маской потёртостей, Specular 0.4, Anisotropic 0.2. Древесные волокна и царапины.", descEn: "Segmented joints, stained wood texture. Roughness 0.6 with wear mask, Specular 0.4, Anisotropic 0.2. Wood grain and scratches." },
            { labelRu: "[3|1] Воксельный / Кубический конструктор", labelEn: "[3|1] Voxel / Cubic constructor", descRu: "Объекты из одинаковых кубов, строгая сетка, нет сглаженных поверхностей. Roughness 0.5–0.7, Specular 0.2. AO по граням.", descEn: "Objects made of identical cubes, strict grid, no smooth surfaces. Roughness 0.5–0.7, Specular 0.2. Edge ambient occlusion." },
            { labelRu: "[4|1] Угольный набросок / Концепт-арт", labelEn: "[4|1] Charcoal sketch / Concept art", descRu: "Хаотичная штриховка, размытые линии, эффект растушёвки. Roughness 0.95, Specular 0.0. Normal map с шумом штрихов, Emission 0.2, Subsurface 0.1. Ворсистая поверхность.", descEn: "Chaotic hatching, blurred lines, smudge effect. Roughness 0.95, Specular 0.0. Hatching noise normal map, Emission 0.2, Subsurface 0.1. Fuzzy surface." },
            { labelRu: "[5|1] Голографическая фольга / Переливчатый пластик", labelEn: "[5|1] Holographic foil / Iridescent plastic", descRu: "Радужные переливы от угла обзора, гладкие формы. Metallic 1.0, Roughness 0.2–0.4, Anisotropic 0.8, Clearcoat 1.0. Радужный градиент в отражениях.", descEn: "Rainbow iridescence with viewing angle, smooth forms. Metallic 1.0, Roughness 0.2–0.4, Anisotropic 0.8, Clearcoat 1.0. Rainbow gradient in reflections." },
            { labelRu: "[6|1] Глитч / Датамос", labelEn: "[6|1] Glitch / Datamosh", descRu: "Смещённые пиксельные блоки, разрыв цветовых каналов, артефакты. Roughness 0.4, Metallic 0.0, Emission 0.8. Маска случайных блоков, normal map с горизонтальными разрывами.", descEn: "Displaced pixel blocks, color channel shifts, compression artifacts. Roughness 0.4, Metallic 0.0, Emission 0.8. Random block mask, normal map with horizontal tears." },
            { labelRu: "[7|1] Бумажная скульптура / Киригами", labelEn: "[7|1] Paper sculpture / Kirigami", descRu: "Тонкие листы бумаги, согнутые под углами, видимые торцы. Roughness 0.85, Specular 0.1, Subsurface 0.15. Чёткие 1-пиксельные линии на гранях, текстура крафт-бумаги.", descEn: "Thin folded paper sheets, visible edges. Roughness 0.85, Specular 0.1, Subsurface 0.15. Sharp 1-pixel edge lines, kraft paper texture." },
            { labelRu: "[8|1] Лава-лампа / Жидкая термопластика", labelEn: "[8|1] Lava lamp / Liquid thermoplastic", descRu: "Тягучие каплевидные формы, медленная деформация, пузырьки. SSS 0.6, Roughness 0.3, Metallic 0.0. Стеклянная оболочка IOR 1.5, градиентная текстура с частицами.", descEn: "Viscous droplet shapes, slow deformation, bubbles. SSS 0.6, Roughness 0.3, Metallic 0.0. Glass shell IOR 1.5, gradient texture with floating particles." },
            { labelRu: "[9|1] Гравюра на картоне / Штриховая резьба", labelEn: "[9|1] Cardboard engraving / Hatching carving", descRu: "Белые линии на чёрном фоне, высокая контрастность, параллельная штриховка. Specular 0.0, Roughness 1.0. Ramp-шейдер на 2 тона, emission-штрихи через нормали.", descEn: "White lines on black background, high contrast, parallel hatching. Specular 0.0, Roughness 1.0. 2-tone ramp shader, emission strokes via normals." },
            { labelRu: "[10|1] Кристалл / Огранённый самоцвет", labelEn: "[10|1] Crystal / Faceted gemstone", descRu: "Резкие многогранные формы, внутренние отражения и преломления. Metallic 0.0, Specular 0.9, Roughness 0.1, Transparency 0.7, IOR 2.4. Дисперсия (радужный блеск на гранях).", descEn: "Sharp faceted forms, internal reflections and refraction. Metallic 0.0, Specular 0.9, Roughness 0.1, Transparency 0.7, IOR 2.4. Dispersion (rainbow edge sparkle)." },
            { labelRu: "[11|1] Эмалевый значок / Твёрдая эмаль", labelEn: "[11|1] Enamel pin / Hard enamel", descRu: "Плоские заливки цветов, разделённые металлическим контуром. Clearcoat 0.9, Roughness 0.2, Metallic 0.7 (только контур). Нормали с выдавленным контуром 0.3 мм.", descEn: "Flat color fills separated by metal outline. Clearcoat 0.9, Roughness 0.2, Metallic 0.7 (outline only). Normals with embossed 0.3 mm contour." },
            { labelRu: "[12|1] Пыльная ретро-фотография / Винтаж", labelEn: "[12|1] Dusty retro photo / Vintage", descRu: "Блёклые тона, зернистость, виньетирование, царапины. Roughness 0.8, Specular 0.05. Процедурная пыль, цветокоррекция в сепию/циан, размытие краёв.", descEn: "Faded tones, grain, vignetting, scratches. Roughness 0.8, Specular 0.05. Procedural dust, sepia/cyan color grading, edge blur." },
            { labelRu: "[13|1] Надувная игрушка / Бамбл-гум", labelEn: "[13|1] Inflatable toy / Bumble-gum", descRu: "Полые надувные формы, видимые швы и клапаны, насыщенные пастельные тона. Roughness 0.3, Specular 0.5, SSS 0.2. Чёткие линии шва с тенью.", descEn: "Hollow inflatable forms, visible seams and valves, saturated pastels. Roughness 0.3, Specular 0.5, SSS 0.2. Sharp seam lines with shadow." },
            { labelRu: "[14|1] Нуар / Чёрно-белое кино", labelEn: "[14|1] Noir / Black-and-white cinema", descRu: "Резкие тени, высокий контраст, дымка. Альбедо — градации серого. Roughness 0.6 (плёночная зернистость), Specular 0.4. Монохромные отражения, объёмный свет «лучей прожектора».", descEn: "Sharp shadows, high contrast, haze. Albedo in grayscale. Roughness 0.6 (film grain), Specular 0.4. Monochrome reflections, volumetric spotlight rays." },
            { labelRu: "[15|1] Школьная доска / Меловой рисунок", labelEn: "[15|1] Chalkboard / Chalk drawing", descRu: "Матовый тёмно-зелёный/чёрный фон, меловые штрихи с размытием. Roughness 0.95, Specular 0.0. Эмиссия у линий, текстура меловой крупицы и разводов от ластика.", descEn: "Matte dark green/black background, chalk strokes with blur. Roughness 0.95, Specular 0.0. Emission on lines, chalk grain and eraser smudge texture." },
            { labelRu: "[16|1] Таксидермия / Музей естествознания", labelEn: "[16|1] Taxidermy / Natural history museum", descRu: "Матовые поверхности старых чучел, стеклянные глаза, выцветший мех/перья. Roughness 0.7 (мех: anisotropic 0.4). Глаза: Metallic 0.9, Roughness 0.1. SSS для кожи и воска, пыль.", descEn: "Matte old taxidermy, glass eyes, faded fur/feathers. Roughness 0.7 (fur: anisotropic 0.4). Eyes: Metallic 0.9, Roughness 0.1. SSS for skin and wax, dust." },
            { labelRu: "[17|1] Витраж / Соборный", labelEn: "[17|1] Stained glass / Cathedral", descRu: "Сегментированные поверхности с тёмным свинцовым контуром, светящиеся фрагменты. Transmission 0.8, Roughness 0.4. Каждый фрагмент — независимая эмиссия. Нормали с выступающими границами.", descEn: "Segmented surfaces with dark lead outline, glowing fragments. Transmission 0.8, Roughness 0.4. Each fragment has independent emission. Normals with raised borders." },
            { labelRu: "[18|1] Винил / Проигрыватель пластинок", labelEn: "[18|1] Vinyl / Record player", descRu: "Глянцевые чёрные диски, микроскопические дорожки, круговые блики. Roughness 0.15, Metallic 0.8, Anisotropic 0.9 (по кругу). Нормали — концентрические бороздки.", descEn: "Glossy black records, microscopic grooves, circular highlights. Roughness 0.15, Metallic 0.8, Anisotropic 0.9 (circular). Normals with concentric grooves." },
            { labelRu: "[19|1] Гипс / Античная статуя", labelEn: "[19|1] Plaster / Ancient statue", descRu: "Матовый белый/светло-серый, мелкозернистая фактура, мягкие тени. Roughness 0.85, Specular 0.05, Subsurface 0.1. Лёгкая шершавость (noise 0.02). Нейтральный цвет с тёплым/холодным оттенком.", descEn: "Matte white/light gray, fine grain, soft shadows. Roughness 0.85, Specular 0.05, Subsurface 0.1. Slight roughness noise 0.02. Neutral color with warm/cool tint." },
            { labelRu: "[20|1] Конфета / Прозрачный мармелад", labelEn: "[20|1] Candy / Transparent gummy", descRu: "Жевательная текстура, яркие полупрозрачные цвета, пузырьки воздуха. SSS 0.7, Roughness 0.2, Specular 0.6, Transparency 0.5, IOR 1.45. Clearcoat 0.8 (сахарная корка).", descEn: "Chewy texture, bright translucent colors, air bubbles. SSS 0.7, Roughness 0.2, Specular 0.6, Transparency 0.5, IOR 1.45. Clearcoat 0.8 (sugar crust)." },
            { labelRu: "[21|1] Пластилиновый / Матовый винил", labelEn: "[21|1] Plasticine / Matte vinyl", descRu: "Упрощённые пухлые формы, отсутствие острых углов. Roughness 0.8–1.0, Specular 0.0. Мягкое подповерхностное рассеивание (SSS) для эффекта софт-тач пластика.", descEn: "Simplified chubby forms, no sharp corners. Roughness 0.8–1.0, Specular 0.0. Soft subsurface scattering for soft-touch plastic feel." },
            { labelRu: "[22|1] Корпоративный минимализм", labelEn: "[22|1] Corporate minimalism", descRu: "Экстремальный гротеск, длинные конечности, крошечные головы. Плоские заливки чистыми пастельными или неоновыми цветами. Без микрорельефа, минимальные градиенты теней.", descEn: "Extreme grotesque, long limbs, tiny heads. Flat fills with clean pastel or neon colors. No micro-detail, minimal shadow gradients." },
            { labelRu: "[23|1] Коллекционная виниловая игрушка", labelEn: "[23|1] Collectible vinyl toy", descRu: "Чёткий силуэт (Funko Pop, KAWS), голова до 50% объёма. Полуматовый (Roughness 0.4–0.6) с размытыми бликами. Идеально гладкая текстура заводского литья.", descEn: "Clear silhouette (Funko Pop, KAWS), head up to 50% of volume. Semi-matte (Roughness 0.4–0.6) with soft highlights. Perfectly smooth factory-cast texture." },
            { labelRu: "[24|1] Паксаровский стиль (Pixar / Disney)", labelEn: "[24|1] Pixar style (Pixar / Disney)", descRu: "Огромные выразительные глаза, детальная мимика, проработанные волосы/шерсть. Сложные PBR-материалы: глубокий SSS для кожи, текстура волокон тканей.", descEn: "Huge expressive eyes, detailed facial expressions, intricate hair/fur. Complex PBR materials: deep SSS for skin, fabric fiber texture." },

// Блокировка UI в зависимости от выбранных пресетов и наличия адаптированного блока
function updateUILockState() {
    const hasSelectedPresets = selected.some(idx => idx !== null);
    const finalText = finalPromptElem.value;
    const hasAdaptedBlock = finalText.includes('<!--ADAPTED_START-->') && finalText.includes('<!--ADAPTED_END-->');

    // 1. Кнопка "Декомпозиция" – активна только если нет выбранных пресетов
    const assistantBtn = document.querySelector('.assistant-btn[data-target="generator"]');
    if (assistantBtn) {
        if (hasSelectedPresets) {
            assistantBtn.classList.add('disabled');
            assistantBtn.disabled = true;
        } else {
            assistantBtn.classList.remove('disabled');
            assistantBtn.disabled = false;
        }
    }

    // 2. Кнопка "Случайно" – блокируется, если есть адаптированный блок
    if (randomBtn) {
        randomBtn.disabled = hasAdaptedBlock;
        if (hasAdaptedBlock) randomBtn.classList.add('disabled');
        else randomBtn.classList.remove('disabled');
    }

    // 3. Кнопка "Сбросить всё" – НЕ БЛОКИРУЕТСЯ (удаляем любые изменения)
    // resetAllBtn всегда активен

    // 4. Все радиокнопки пресетов и кнопки сброса категорий – блокируются, если есть адаптированный блок
    const allRadios = document.querySelectorAll('.preset-item input[type="radio"]');
    const allResetCatBtns = document.querySelectorAll('.reset-cat');
    
    allRadios.forEach(radio => {
        radio.disabled = hasAdaptedBlock;
    });
    allResetCatBtns.forEach(btn => {
        btn.disabled = hasAdaptedBlock;
        if (hasAdaptedBlock) btn.classList.add('disabled');
        else btn.classList.remove('disabled');
    });

    // 5. Блокировка кликов по самим пресет-айтенам
    const allPresetItems = document.querySelectorAll('.preset-item');
    allPresetItems.forEach(item => {
        if (hasAdaptedBlock) {
            item.classList.add('disabled');
            item.style.pointerEvents = 'none';
        } else {
            item.classList.remove('disabled');
            item.style.pointerEvents = '';
        }
    });
}

    // ======================= БЕГУЩАЯ СТРОКА =======================
    function applyMarqueeToDescriptions() {
        const allDesc = document.querySelectorAll('.preset-desc');
        let attempts = 0;
        const maxAttempts = 10;

        function processDesc(descEl, originalText) {
            const containerWidth = descEl.clientWidth;
            if (containerWidth === 0 && attempts < maxAttempts) {
                attempts++;
                setTimeout(() => processDesc(descEl, originalText), 50);
                return;
            }
            const originalWhiteSpace = getComputedStyle(descEl).whiteSpace;
            descEl.style.whiteSpace = 'nowrap';
            const textWidth = descEl.scrollWidth;
            descEl.style.whiteSpace = originalWhiteSpace;
            if (textWidth > containerWidth && containerWidth > 0) {
                const track = document.createElement('div');
                track.className = 'marquee-track';
                const contentSpan = document.createElement('div');
                contentSpan.className = 'marquee-content';
                contentSpan.textContent = originalText + '   ' + originalText;
                const duration = Math.min(15, Math.max(4, originalText.length / 15));
                contentSpan.style.animationDuration = `${duration}s`;
                track.appendChild(contentSpan);
                descEl.innerHTML = '';
                descEl.appendChild(track);
            } else {
                descEl.innerHTML = originalText;
            }
        }

        allDesc.forEach(descEl => {
            if (descEl.querySelector('.marquee-track')) return;
            const originalText = descEl.getAttribute('data-full-text');
            if (!originalText) return;
            attempts = 0;
            processDesc(descEl, originalText);
        });
    }

    // ======================= ПОСТРОЕНИЕ КАРТОЧЕК =======================
    function buildCategories() {
        if (!container) return;
        container.innerHTML = '';
        for (let catIdx = 0; catIdx < categoriesData.length; catIdx++) {
            const cat = categoriesData[catIdx];
            const catDiv = document.createElement('div');
            catDiv.className = 'category';
            const header = document.createElement('div');
            header.className = 'category-header';
            const catTitle = currentLang === 'ru' ? cat.nameRu : cat.nameEn;
            const resetText = currentLang === 'ru' ? 'Сбросить' : 'Reset';
            header.innerHTML = `<h2>${catTitle}</h2><button class="reset-cat" data-cat="${catIdx}">${resetText}</button>`;
            const listDiv = document.createElement('div');
            listDiv.className = 'presets-list';
            cat.presets.forEach((preset, presetIdx) => {
                const presetItem = document.createElement('div');
                presetItem.className = 'preset-item';
                if (selected[catIdx] === presetIdx) presetItem.classList.add('selected');
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `cat_${catIdx}`;
                radio.value = presetIdx;
                radio.checked = (selected[catIdx] === presetIdx);
                const infoDiv = document.createElement('div');
                infoDiv.className = 'preset-info';
                const labelDiv = document.createElement('div');
                labelDiv.className = 'preset-label';
                let labelText = preset.labelRu;
                let descText = preset.descRu;
                if (currentLang === 'en') {
                    labelText = preset.labelEn || preset.labelRu;
                    descText = preset.descEn || preset.descRu;
                }
                labelDiv.textContent = labelText;
                const descDiv = document.createElement('div');
                descDiv.className = 'preset-desc';
                descDiv.textContent = descText;
                descDiv.setAttribute('data-full-text', descText);
                infoDiv.appendChild(labelDiv);
                infoDiv.appendChild(descDiv);
                presetItem.appendChild(radio);
                presetItem.appendChild(infoDiv);
                radio.addEventListener('change', () => {
                    if (radio.checked) {
                        if (selected[catIdx] === presetIdx) {
                            radio.checked = false;
                            selected[catIdx] = null;
                            presetItem.classList.remove('selected');
                            if (!userEdited) updateFinalPromptFromData();
                            updateCategoryResetButton(catIdx);
                            updateGlobalResetButton();
                            return;
                        }
                        const prevSelected = selected[catIdx];
                        if (prevSelected !== null) {
                            const prevItem = listDiv.querySelector(`.preset-item input[value="${prevSelected}"]`)?.closest('.preset-item');
                            if (prevItem) prevItem.classList.remove('selected');
                        }
                        selected[catIdx] = presetIdx;
                        presetItem.classList.add('selected');
                        if (!userEdited) updateFinalPromptFromData();
                        updateCategoryResetButton(catIdx);
                        updateGlobalResetButton();
                    } else {
                        if (selected[catIdx] === presetIdx) {
                            selected[catIdx] = null;
                            presetItem.classList.remove('selected');
                            if (!userEdited) updateFinalPromptFromData();
                            updateCategoryResetButton(catIdx);
                            updateGlobalResetButton();
                        }
                    }
                });
                presetItem.addEventListener('click', (e) => {
                    if (e.target.tagName === 'INPUT' && e.target.type === 'radio') return;
                    radio.click();
                });
                listDiv.appendChild(presetItem);
            });
            catDiv.appendChild(header);
            catDiv.appendChild(listDiv);
            container.appendChild(catDiv);
        }
        setTimeout(() => {
            applyMarqueeToDescriptions();
        }, 100);
    }

    // ======================= ПЕРЕТАСКИВАНИЕ ИКОНКИ =======================
    function initDragIcon() {
        const dragIcon = document.getElementById('drag-icon');
        if (!dragIcon) return;
        let dragActive = false;
        let startX = 0, startY = 0;
        let initialLeft = 0, initialTop = 0;

        function startDrag(e) {
            e.preventDefault();
            dragActive = true;
            const rect = dragIcon.getBoundingClientRect();
            let left = rect.left;
            let top = rect.top;
            dragIcon.style.right = 'auto';
            dragIcon.style.bottom = 'auto';
            dragIcon.style.left = left + 'px';
            dragIcon.style.top = top + 'px';
            const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
            startX = clientX;
            startY = clientY;
            initialLeft = left;
            initialTop = top;
            document.addEventListener('mousemove', onDrag);
            document.addEventListener('mouseup', stopDrag);
            document.addEventListener('touchmove', onDrag, { passive: false });
            document.addEventListener('touchend', stopDrag);
        }

        function onDrag(e) {
            if (!dragActive) return;
            e.preventDefault();
            let clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
            let clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
            const dx = clientX - startX;
            const dy = clientY - startY;
            dragIcon.style.left = (initialLeft + dx) + 'px';
            dragIcon.style.top = (initialTop + dy) + 'px';
        }

        function stopDrag() {
            dragActive = false;
            document.removeEventListener('mousemove', onDrag);
            document.removeEventListener('mouseup', stopDrag);
            document.removeEventListener('touchmove', onDrag);
            document.removeEventListener('touchend', stopDrag);
        }

        dragIcon.addEventListener('mousedown', startDrag);
        dragIcon.addEventListener('touchstart', startDrag, { passive: false });
        dragIcon.addEventListener('dblclick', () => {
            dragIcon.style.left = 'auto';
            dragIcon.style.right = '20px';
            dragIcon.style.bottom = '20px';
            dragIcon.style.top = 'auto';
        });
    }

    // ======================= КОПИРОВАНИЕ =======================
    function copyToClipboard() {
        const text = finalPromptElem.value;
        if (!text || text.length < 10) {
            copyBtn.textContent = currentLang === 'ru' ? 'Нечего копировать' : 'Nothing to copy';
            setTimeout(() => copyBtn.textContent = (currentLang === 'ru' ? 'КОПИРОВАТЬ' : 'COPY'), 1000);
            return;
        }
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(() => {
                const original = copyBtn.textContent;
                copyBtn.textContent = currentLang === 'ru' ? 'Скопировано!' : 'Copied!';
                setTimeout(() => copyBtn.textContent = original, 1500);
            }).catch(() => fallbackCopy(text));
        } else {
            fallbackCopy(text);
        }
    }

    function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.top = '-9999px';
        textarea.style.left = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        textarea.setSelectionRange(0, text.length);
        let success = false;
        try {
            success = document.execCommand('copy');
        } catch (err) {}
        document.body.removeChild(textarea);
        if (success) {
            const original = copyBtn.textContent;
            copyBtn.textContent = currentLang === 'ru' ? 'Скопировано!' : 'Copied!';
            setTimeout(() => copyBtn.textContent = original, 1500);
        } else {
            copyBtn.textContent = currentLang === 'ru' ? 'Ошибка копирования' : 'Copy error';
            setTimeout(() => copyBtn.textContent = (currentLang === 'ru' ? 'КОПИРОВАТЬ' : 'COPY'), 1500);
        }
    }

                        <button id="addToFinalBtn" style="margin-top:8px;">${isRu ? 'ДОБАВИТЬ В ФИНАЛЬНЫЙ ПРОМПТ' : 'ADD TO FINAL PROMPT'}</button>
                    </div>
                `;
                assistantContent.appendChild(containerDiv);

                const generateBtn = containerDiv.querySelector('#generatePresetBtn');
                const resultDiv = containerDiv.querySelector('#generatorResult');
                const textarea = containerDiv.querySelector('#presetDescription');
                const adaptedSection = containerDiv.querySelector('#adaptedSection');
                const adaptedTextarea = containerDiv.querySelector('#adaptedText');
                const addToFinalBtn = containerDiv.querySelector('#addToFinalBtn');

                // СИСТЕМНЫЕ ПРОМПТЫ УДАЛЕНЫ – ВСТАВЬТЕ СВОИ НИЖЕ
                const systemPromptRu = `Ты — интеллектуальный анализатор и генератор промптов для профессионального конструктора IDESI.

На вход ты получаешь текстовое описание (промпт) — оно может быть коротким или очень подробным, структурированным или хаотичным. Это может быть уже готовый промпт для генерации изображения, написанный пользователем в свободной форме, или просто набор пожеланий.

Твоя задача — проанализировать этот текст и разложить его на 9 категорий, предусмотренных конструктором IDESI. Для каждой категории, по которой в тексте есть информация (явная или неявная), ты должен сгенерировать одну строку в строгом формате:
- [X] НАЗВАНИЕ: сгенерированное описание

Категории должны содержать:
- [1] СТИЛЬ: Глобальный художественный и шейдерный движок сцены, имитация материалов и рендеринга (гуашь, воксели, винил, Cel-Shading, Unlit, PS1 low-poly, Stop-Motion).
- [2] БАЗОВАЯ ПЛОСКОСТЬ (опора под ногами): Физический пол, текстура и материал, поглощение/отражение света снизу.
- [3] БЛИЖНИЙ ПЛАН (окружение вокруг персонажа): Интерьер, текстуры и материалы.
- [4] ДАЛЬНИЙ ПЛАН: Архитектурный дальний план, текстуры и материалы.
- [5] РАКУРС: Кадрирование, тип линз, углы и геометрические искажения.
- [6] СВЕТ И ЦВЕТ: Световые схемы, источники, углы падения в градусах, тени и колористика.
- [7] ОДЕЖДА И ЭКИПИРОВКА: Аутфит.
- [8] ПОЗА И ДИНАМИКА: Биомеханика тела, распределение веса, жесты, движения.
- [9] ПРИЧЕСКА И ВОЛОСЫ: Стрижка, укладка, физика, геометрия и динамика волос/головы.

ПРАВИЛА ИНФЕРЕНЦИИ И ЗАПОЛНЕНИЯ ПРОПУСКОВ:
Пользователь может указать лишь часть параметров или чистый образ. Алгоритм ОБЯЗАН самостоятельно рассчитать и достроить техническую спецификацию, логически вытекающую из контекста. Все скрытые параметры должны присутствовать в финальном описании:
- В категории РАКУРС: Обязательно укажи тип кадрирования, положение камеры по высоте, эффект линзы/фокусное расстояние, композиционную геометрию и плоскость фокуса.
- В категории СВЕТ И ЦВЕТ: Обязательно жестко пропиши схему освещения, конкретный источник света, угол падения в градусах или направление падения, характер и геометрию теней, а также цветовую гамму, градинг или оптические аберрации.
- В категории ОДЕЖДА / БЛИЖНИЙ ПЛАН / БАЗОВАЯ ПЛОСКОСТЬ: Раскладывай образ на PBR-текстуры (Roughness, Specular, Metallic, IOR, SSS, Transmission), силуэт/крой (oversized, tight-fitting, layered), функциональный обвес (straps, pouches, rivets) и текстурный износ (battle-worn, scratched, tattered, matted, dusty).
- В категории ПОЗА: Расписывай распределение веса/опору (on all fours, sitting on haunches), жестикуляцию рук (hands clutching head, extended hand), направление взгляда/наклон головы и физику взаимодействия с полом или одеждой.
- В категории ПРИЧЕСКА И ВОЛОСЫ: Указывай тип стрижки, текстуру (spiked, sleek, messy, coily), спецэффекты (glowing fibers, iridescent, molten liquid) и динамику (wind-blown, streaming down, hanging forward).
- Важное правило многозадачности: исходный текст может описывать несколько категорий одновременно. Например, фраза «киберпанк-ниндзя в неоновом городе стоит в динамичной позе» должна дать категории [1] СТИЛЬ (киберпанк), [7] ОДЕЖДА (ниндзя), [4] ДАЛЬНИЙ ПЛАН (неоновый город), [8] ПОЗА (динамичная). Не ограничивайся одной категорией.
- Если в тексте явно описана одна категория, но остальные не упомянуты — выведи только её. Не нужно придумывать остальные.
- Если текст описывает конкретный визуальный образ без разбивки на категории — всё равно постарайся выделить из него все возможные категории, но не натягивай.
- Особый случай: если входной текст уже соответствует формату: - [X] НАЗВАНИЕ: описание, выведи его без изменений.
- Если ни одна из 9 категорий не может быть достоверно определена (запрос не по теме или абстрактный), выведи одну строку: недостаточно данных.

                    `;
                    const copyGenBtn = resultDiv.querySelector('#copyGeneratedBtn');
                    if (copyGenBtn) {

                            adaptedSection.scrollIntoView({ behavior: 'smooth', block: 'center' });

                addToFinalBtn.addEventListener('click', () => {
                    let adaptedText = adaptedTextarea.value.trim();
                    if (!adaptedText) {
                        alert(isRu ? 'Поле с ответом языковой модели пусто. Вставьте текст.' : 'The language model response field is empty. Paste the text.');
                        return;
                    }
                    const finalElem = document.getElementById('finalPrompt');
                    let currentPrompt = finalElem.value;

                    const startMarker = '<!--ADAPTED_START-->';
                    const endMarker = '<!--ADAPTED_END-->';
                    const adaptedBlock = startMarker + '\n' + adaptedText + '\n' + endMarker;

                    const startIdx = currentPrompt.indexOf(startMarker);
                    const endIdx = currentPrompt.indexOf(endMarker);

                    if (startIdx !== -1 && endIdx !== -1) {
                        const before = currentPrompt.substring(0, startIdx);
                        const after = currentPrompt.substring(endIdx + endMarker.length);
                        currentPrompt = before + adaptedBlock + after;
                    } else {
                        const isRuLang = currentLang === 'ru';
                        const targetLine = isRuLang ? '[ВХОДЯЩИЕ ДАННЫЕ ДЛЯ ГЕНЕРАЦИИ]:' : '[INPUT DATA FOR GENERATION]:';
                        const targetIndex = currentPrompt.indexOf(targetLine);
                        if (targetIndex !== -1) {
                            const lineEndIndex = currentPrompt.indexOf('\n', targetIndex);
                            const insertPosition = (lineEndIndex !== -1) ? lineEndIndex + 1 : targetIndex + targetLine.length + 1;
                            currentPrompt = currentPrompt.slice(0, insertPosition) + adaptedBlock + '\n' + currentPrompt.slice(insertPosition);
                        } else {
                            currentPrompt += '\n' + adaptedBlock;
                        }
                    }

                    finalElem.value = currentPrompt;
                    if (!userEdited) {
                        userEdited = true;
                        finalElem.classList.add('edited');
                        updateManualBadge();

                    alert(isRu ? 'Адаптированный текст добавлен в финальный промпт.' : 'Adapted text added to final prompt.');

        let hls = null;
        let isHlsPlaying = false;
        const audio = new Audio();

        hlsRadioBtn.addEventListener('click', () => {
            if (!hls) {
                if (Hls.isSupported()) {
                    hls = new Hls();
                    hls.loadSource('https://hls.rpfm.ru/rpfm/aac_hifi.m3u8');
                    hls.attachMedia(audio);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        audio.play();
                        isHlsPlaying = true;
                        hlsRadioBtn.textContent = '⏸';
                        hlsRadioBtn.style.background = '#2c5a3a';
                        hlsRadioBtn.style.borderColor = '#6aab7a';
                        hlsRadioBtn.style.color = '#d0f0d0';
                    });
                } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
                    audio.src = 'https://hls.rpfm.ru/rpfm/aac_hifi.m3u8';
                    audio.play();
                    isHlsPlaying = true;
                    hlsRadioBtn.textContent = '⏸';
                    hlsRadioBtn.style.background = '#2c5a3a';
                    hlsRadioBtn.style.borderColor = '#6aab7a';
                    hlsRadioBtn.style.color = '#d0f0d0';
                }
            } else if (isHlsPlaying) {
                audio.pause();
                isHlsPlaying = false;
                hlsRadioBtn.textContent = '▶';
                hlsRadioBtn.style.background = '#252538';
                hlsRadioBtn.style.borderColor = '#8a8aa6';
                hlsRadioBtn.style.color = '#cdd6f4';
            } else {
